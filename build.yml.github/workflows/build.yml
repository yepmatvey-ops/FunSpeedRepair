name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - run: mvn clean package

      - uses: actions/upload-artifact@v4
        with:
          name: FunSpeedRepair
          path: target/*.jar
