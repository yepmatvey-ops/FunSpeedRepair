name: FunSnow Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout репозитория
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Установка Java 21 (ВАЖНО)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 3. Проверка версий (для дебага)
      - name: Check Java & Maven
        run: |
          java -version
          mvn -version

      # 4. Сборка проекта
      - name: Build with Maven
        run: mvn clean package

      # 5. Upload JAR
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunSnow
          path: target/*.jar
